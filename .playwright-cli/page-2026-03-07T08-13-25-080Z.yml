      - generic [ref=e33]: "[part] helmet [suitspec.prompt] Generate a UV-ready texture atlas for one armor module. Target module: helmet (helmet shell with visor aperture, no face, no neck). Style tags: metal, visor, audit. Palette primary=#1E2A3A, secondary=#A8B3C6, emissive=#3AC7FF. Hard-surface industrial hero armor, clean panel lines, production-ready concept sheet. Output format requirements: - 1:1 square texture map (base-color/albedo style), no perspective view. - Resolution target: 2048x2048 equivalent detail density. - Flat texture sheet only. Do NOT draw standalone objects, mannequins, or scene background. - Texture fill ratio target: 82-96% of the canvas should contain intended material/panel information. - Border seam-safe margin: outer 3-5% edges should be low-frequency detail only. - Do not leave large blank white regions (>10% contiguous area). - Maintain consistent material language across the whole sheet. - UV layout intent: Visor band and frontal silhouette should occupy center U range (0.30-0.70). Top crown detail should concentrate in upper V range (0.58-0.92). Back-seam area near U<0.06 and U>0.94 must stay low-frequency. - Keep directional panel lines continuous across UV seams (U wrap continuity). - No text, watermark, logos, or frame graphics."
