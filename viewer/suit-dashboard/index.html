<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suit Dashboard</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <h1>Suit Dashboard</h1>
        <p class="sub">メッシュUV向け生成・3Dプレビュー・UV展開確認</p>
      </header>

      <section class="controls">
        <div class="field">
          <label for="suitPath">SuitSpec</label>
          <div class="row">
            <select id="suitPath"></select>
            <button id="btnRefreshSuits">更新</button>
            <button id="btnLoadSuit">読込</button>
          </div>
        </div>

        <div class="field">
          <label for="fallbackDir">Fallback Dir</label>
          <input id="fallbackDir" type="text" value="sessions/S-20260228-JBJK/artifacts/parts" />
        </div>

        <div class="field grid2">
          <div>
            <label for="textureMode">生成モード</label>
            <select id="textureMode">
              <option value="mesh_uv" selected>mesh_uv（展開図向け）</option>
              <option value="concept">concept（イメージ）</option>
            </select>
          </div>
          <div>
            <label for="simPath">Body Sim</label>
            <input id="simPath" type="text" value="sessions/body-sim.json" />
          </div>
        </div>

        <div class="checks">
          <label><input id="preferFallback" type="checkbox" /> 既存画像を優先</label>
          <label><input id="uvRefine" type="checkbox" checked /> UV二段階生成</label>
          <label><input id="updateSuitspec" type="checkbox" checked /> SuitSpecへ反映</label>
        </div>

        <div class="field">
          <label for="promptPart">現在プロンプト確認</label>
          <select id="promptPart"></select>
          <pre id="promptPreview">プロンプト未読み込み</pre>
        </div>

        <div class="field">
          <label>対象パーツ</label>
          <div id="partChecks" class="parts"></div>
        </div>

        <div class="field fit-panel">
          <label>Fit 調整（部位ごと）</label>
          <div class="fit-head">
            <select id="fitPart"></select>
            <button id="btnFitLoad">読込</button>
            <button id="btnFitApply">適用</button>
          </div>

          <div class="fit-grid">
            <label class="fit-field">
              <span>source</span>
              <select id="fitSource">
                <option value="chest_core">chest_core</option>
                <option value="left_upperarm">left_upperarm</option>
                <option value="right_upperarm">right_upperarm</option>
                <option value="left_forearm">left_forearm</option>
                <option value="right_forearm">right_forearm</option>
                <option value="left_thigh">left_thigh</option>
                <option value="right_thigh">right_thigh</option>
                <option value="left_shin">left_shin</option>
                <option value="right_shin">right_shin</option>
              </select>
            </label>
            <label class="fit-field">
              <span>attach</span>
              <select id="fitAttach">
                <option value="start">start</option>
                <option value="center">center</option>
                <option value="end">end</option>
              </select>
            </label>
            <label class="fit-field">
              <span>offsetY</span>
              <input id="fitOffsetY" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>zOffset</span>
              <input id="fitZOffset" type="number" step="0.01" />
            </label>

            <label class="fit-field">
              <span>scaleX</span>
              <input id="fitScaleX" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>scaleY</span>
              <input id="fitScaleY" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>scaleZ</span>
              <input id="fitScaleZ" type="number" step="0.01" />
            </label>

            <label class="fit-field">
              <span>followX</span>
              <input id="fitFollowX" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>followY</span>
              <input id="fitFollowY" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>followZ</span>
              <input id="fitFollowZ" type="number" step="0.01" />
            </label>

            <label class="fit-field">
              <span>minScaleX</span>
              <input id="fitMinScaleX" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>minScaleY</span>
              <input id="fitMinScaleY" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>minScaleZ</span>
              <input id="fitMinScaleZ" type="number" step="0.01" />
            </label>
          </div>

          <div class="fit-actions">
            <button id="btnFitReset">部位fitを解除</button>
            <button id="btnFitSave">SuitSpecへ保存</button>
          </div>
          <pre id="fitPreview">fit未設定</pre>
        </div>

        <div class="field fit-panel">
          <label>VRM 配置（部位 -> 骨アンカー）</label>
          <div class="fit-head">
            <select id="vrmPart"></select>
            <button id="btnVrmLoad">読込</button>
            <button id="btnVrmApply">適用</button>
          </div>

          <div class="fit-grid">
            <label class="fit-field">
              <span>attachment_slot</span>
              <input id="vrmSlot" type="text" />
            </label>
            <label class="fit-field">
              <span>bone</span>
              <select id="vrmBone"></select>
            </label>
            <label class="fit-field">
              <span>offsetX</span>
              <input id="vrmOffsetX" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>offsetY</span>
              <input id="vrmOffsetY" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>offsetZ</span>
              <input id="vrmOffsetZ" type="number" step="0.01" />
            </label>
            <label class="fit-field">
              <span>rotX(deg)</span>
              <input id="vrmRotX" type="number" step="1" />
            </label>
            <label class="fit-field">
              <span>rotY(deg)</span>
              <input id="vrmRotY" type="number" step="1" />
            </label>
            <label class="fit-field">
              <span>rotZ(deg)</span>
              <input id="vrmRotZ" type="number" step="1" />
            </label>
            <label class="fit-field">
              <span>scaleX</span>
              <input id="vrmScaleX" type="number" step="0.01" min="0.01" />
            </label>
            <label class="fit-field">
              <span>scaleY</span>
              <input id="vrmScaleY" type="number" step="0.01" min="0.01" />
            </label>
            <label class="fit-field">
              <span>scaleZ</span>
              <input id="vrmScaleZ" type="number" step="0.01" min="0.01" />
            </label>
          </div>

          <div class="fit-actions">
            <button id="btnVrmReset">部位anchorを解除</button>
            <button id="btnVrmSave">SuitSpecへ保存</button>
          </div>
          <div class="checks">
            <label><input id="vrmAnchorVisible" type="checkbox" checked /> 全身プレビューにアンカー表示</label>
          </div>
          <pre id="vrmPreview">vrm_anchor未設定</pre>
        </div>

        <div class="field fit-panel">
          <label>VRM モデル（既定ファイル運用）</label>
          <div class="fit-head">
            <input
              id="vrmModelPath"
              type="text"
              value="viewer/assets/vrm/default.vrm"
              placeholder="viewer/assets/vrm/default.vrm"
            />
            <button id="btnVrmModelLoad">VRM読込</button>
            <button id="btnVrmModelClear">VRM解除</button>
          </div>
          <p class="fit-note">
            既定: <code>viewer/assets/vrm/default.vrm</code>（.glb/.gltf も可）
          </p>
          <pre id="vrmModelStatus">VRM: 未読込</pre>
        </div>

        <div class="actions">
          <button id="btnGenerate" class="primary">生成実行</button>
          <button id="btnAutoFitSave">Auto Fit + Save</button>
          <button id="btnOpenBodyFit">Body Fit を開く</button>
        </div>

        <div class="field">
          <label for="reliefSlider">Mesh Relief</label>
          <input id="reliefSlider" type="range" min="0" max="0.1" step="0.01" value="0.05" />
        </div>

        <pre id="status">準備中...</pre>
      </section>

      <section class="content-wrap">
        <div class="content-tabs">
          <button id="tabParts" class="tab-btn active" data-tab="parts">パーツカード</button>
          <button id="tabBody" class="tab-btn" data-tab="body">ボディ前景</button>
        </div>

        <div id="panelParts" class="panel active">
          <div id="cards" class="cards"></div>
        </div>

        <div id="panelBody" class="panel">
          <canvas id="bodyFrontCanvas" class="body-canvas"></canvas>
          <div class="body-tune">
            <div class="body-tune-head">
              <strong>全身プレビュー上でサイズ調整</strong>
              <small>変更は fit に反映されます（保存は別操作）</small>
            </div>
            <div class="body-tune-grid">
              <label class="body-tune-field">
                <span>部位</span>
                <select id="bodyTunePart"></select>
              </label>
              <label class="body-tune-field">
                <span>scaleX</span>
                <input id="bodyTuneScaleX" type="number" step="0.01" min="0.10" max="3.00" />
              </label>
              <label class="body-tune-field">
                <span>scaleY</span>
                <input id="bodyTuneScaleY" type="number" step="0.01" min="0.10" max="3.00" />
              </label>
              <label class="body-tune-field">
                <span>scaleZ</span>
                <input id="bodyTuneScaleZ" type="number" step="0.01" min="0.10" max="3.00" />
              </label>
              <label class="body-tune-field">
                <span>offsetY</span>
                <input id="bodyTuneOffsetY" type="number" step="0.01" min="-1.00" max="1.00" />
              </label>
              <label class="body-tune-field">
                <span>zOffset</span>
                <input id="bodyTuneZOffset" type="number" step="0.01" min="-1.00" max="1.00" />
              </label>
            </div>
            <div class="body-tune-actions">
              <button id="btnBodyTuneApply">全身プレビューに適用</button>
              <button id="btnBodyTuneToFit">Fit編集欄へ同期</button>
            </div>
          </div>
          <div id="bodyFrontMeta" class="body-meta">読み込み待機中...</div>
        </div>
      </section>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "../body-fit/vendor/three/build/three.module.js",
          "three/addons/": "../body-fit/vendor/three/examples/jsm/",
          "three/examples/jsm/": "../body-fit/vendor/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./dashboard.js?v=20260307h"></script>
  </body>
</html>
