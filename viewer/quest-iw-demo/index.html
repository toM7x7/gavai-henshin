<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IW HENSHIN Quest VR Demo</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage">
      <div id="xrRoot" class="xr-root" aria-label="IWSDK immersive scene"></div>

      <section class="hud" aria-label="IW henshin demo controls">
        <p class="eyebrow">IWSDK / mocopi / Sakura AI Engine bridge</p>
        <h1>生成装着</h1>
        <p id="status" class="status">Quest 3 VR準備完了。音声で変身、記録再生で鏡/観察を確認します。</p>
        <div class="meter" aria-hidden="true"><span id="meterFill"></span></div>
        <div class="route-panel" aria-label="New Route status">
          <span id="routeMode">生成: LOCAL</span>
          <span id="routeApi">適合検査: WAIT</span>
          <span id="routeTrial">変身試験: WAIT</span>
          <span id="routeReplay">記録保管: WAIT</span>
        </div>
        <p id="routeContract" class="route-contract">FIT CONTRACT: WAIT / TEXTURE FALLBACK: WAIT</p>
        <div class="recall-dock" aria-label="Quest suit recall">
          <div class="recall-head">
            <span class="recall-kicker">Quest呼び出し</span>
            <label for="recallCodeInput">4桁コード</label>
          </div>
          <div class="recall-entry">
            <input
              id="recallCodeInput"
              type="text"
              inputmode="text"
              maxlength="4"
              placeholder="A1B2"
              autocomplete="off"
              autocapitalize="characters"
              spellcheck="false"
              enterkeyhint="go"
              aria-describedby="recallCodeState"
            />
            <button id="btnLoadRecallCode" type="button">呼び出す</button>
          </div>
          <span id="recallCodeState">4桁コード未指定</span>
        </div>
        <div class="actions">
          <button id="btnEnterVR" type="button">VR開始</button>
          <button id="btnVoice" type="button">音声</button>
          <button id="btnReplay" type="button">記録再生</button>
          <button id="btnReplayView" type="button">鏡</button>
          <button id="btnPause" type="button">停止</button>
          <button id="btnReset" type="button">リセット</button>
        </div>
        <p id="micState" class="mic-state">音声処理はローカルAPI経路で待機します。</p>
        <p id="voiceLine" class="voice-line"></p>
        <details id="debugPanel" class="debug-panel" open>
          <summary>音声デバッグ</summary>
          <pre id="voiceDebug">音声待機中。</pre>
        </details>
      </section>

      <section class="readout" aria-label="Session readout">
        <span id="sessionId">SESSION</span>
        <span id="triggerState">TRIGGER</span>
        <span id="equipState">EQUIP</span>
      </section>
    </main>
    <script type="module" src="./quest-demo.js"></script>
  </body>
</html>
